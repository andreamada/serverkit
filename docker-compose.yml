# ============================================
# ServerKit Docker Compose
# ============================================
# Runs both backend and frontend in Docker.
# Note: System management features (PHP install,
# firewall, etc.) won't work in Docker.
#
# Usage:
#   docker compose up --build -d
#
# Access:
#   Frontend: http://localhost:3847
#   Backend:  http://localhost:5849
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: serverkit-frontend
    ports:
      - "3847:80"
    networks:
      - serverkit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  serverkit-network:
    driver: bridge
    name: serverkit-network
