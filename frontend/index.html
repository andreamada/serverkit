<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ServerKit - Server Management Dashboard" />
    <title>ServerKit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <script>
        // Prevent flash of unstyled content (FOUC) by setting theme + accent before React loads
        (function() {
            var d = document.documentElement;
            var t = localStorage.getItem('theme') || 'dark';
            d.setAttribute('data-theme', t);
            if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                d.classList.add('dark');
            }
            var accent = localStorage.getItem('accent_color');
            if (accent) {
                var m = accent.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
                if (m) {
                    var r = parseInt(m[1],16)/255, g = parseInt(m[2],16)/255, b = parseInt(m[3],16)/255;
                    var max = Math.max(r,g,b), min = Math.min(r,g,b);
                    var h, s, l = (max+min)/2;
                    if (max === min) { h = s = 0; } else {
                        var diff = max - min;
                        s = l > 0.5 ? diff/(2-max-min) : diff/(max+min);
                        switch(max) { case r: h=(g-b)/diff+(g<b?6:0); break; case g: h=(b-r)/diff+2; break; case b: h=(r-g)/diff+4; break; }
                        h /= 6;
                    }
                    var hsl = Math.round(h*360)+' '+Math.round(s*100)+'% '+Math.round(l*100)+'%';
                    var dk = function(v){ return Math.max(0, Math.round(v*0.88)); };
                    d.style.setProperty('--accent-primary', accent);
                    d.style.setProperty('--accent-hover', '#'+dk(r*255).toString(16).padStart(2,'0')+dk(g*255).toString(16).padStart(2,'0')+dk(b*255).toString(16).padStart(2,'0'));
                    d.style.setProperty('--accent-glow', 'rgba('+Math.round(r*255)+','+Math.round(g*255)+','+Math.round(b*255)+',0.15)');
                    d.style.setProperty('--accent-shadow', 'rgba('+Math.round(r*255)+','+Math.round(g*255)+','+Math.round(b*255)+',0.3)');
                    d.style.setProperty('--ring', hsl);
                    d.style.setProperty('--primary', hsl);
                }
            }
            var pageTitles = {
                '/': 'Dashboard', '/dashboard': 'Dashboard',
                '/servers': 'Servers', '/applications': 'Applications',
                '/databases': 'Databases', '/docker': 'Docker',
                '/security': 'Security', '/ssl': 'SSL',
                '/domains': 'Domains', '/dns': 'DNS', '/email': 'Email',
                '/files': 'File Manager', '/ftp': 'FTP',
                '/git': 'Git', '/cron': 'Cron Jobs',
                '/monitoring': 'Monitoring', '/backups': 'Backups',
                '/terminal': 'Terminal', '/settings': 'Settings',
                '/users': 'Users', '/marketplace': 'Marketplace',
                '/services': 'Services', '/apps': 'Applications',
                '/wordpress': 'WordPress', '/workflows': 'Workflows',
            };
            var basePath = '/' + window.location.pathname.split('/')[1];
            var pageTitle = pageTitles[basePath];
            var brandName = 'ServerKit';
            try {
                var wl = localStorage.getItem('white_label');
                if (wl) {
                    var w = JSON.parse(wl);
                    if (w.enabled && w.brandName) brandName = w.brandName;
                }
            } catch(e) {}
            document.title = pageTitle ? pageTitle + ' | ' + brandName : brandName;
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
